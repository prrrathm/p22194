# yaml-language-server: $schema=https://taskfile.dev/schema.json

version: '3'

dotenv: ['.env']

vars:
  GREETING: Hello, world!

tasks:
  init:
    desc: Initialize git submodules after a fresh clone
    cmds:
      - git submodule update --init --recursive

  update-submodules:
    desc: Pull latest changes from all submodule remotes
    cmds:
      - git submodule update --remote --merge

  default:
    desc: Print a greeting message
    cmds:
      - echo "{{.GREETING}}"
    silent: true
  
  run-gateway:
      desc: Run API GATEWAY
      cmds:
          - cd api-gateway && go run cmd/gateway/main.go

  dev-gateway:
      desc: Run API GATEWAY
      cmds:
          - cd api-gateway && air

  run-service-user:
    desc: Run User service
    cmds:
      - echo "{{.GREETING}}"
      - cd services/users && go run .

  dev-service-user:
      desc: Run User service dev
      cmds:
          - cd services/users && air

  run-service-kitchen:
    desc: Run Kitchen service
    cmds:
      - cd services/kitchen && go run .

  dev-service-kitchen:
    desc: Run Kitchen service dev
    cmds:
      - cd services/kitchen && air

  run-service-mail:
    desc: Run Mail service
    cmds:
      - cd services/mail && set -a && . ../../.env && set +a && go run .

  dev-service-mail:
    desc: Run Mail service dev
    cmds:
      - cd services/mail && air

  dev-client-kitchen:
    desc: Run Kitchen client dev
    cmds:
      - cd clients/kitchen-client && bun run dev

  dev:
    desc: Run all services concurrently (gateway, kitchen, mail, client)
    deps:
      - dev-gateway
      - dev-service-kitchen
      - dev-service-mail
      - dev-client-kitchen
